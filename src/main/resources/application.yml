spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartchat_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

logging:
  level:
    org.flywaydb: DEBUG

app:
  jwt:
    secret: smartchat-super-secret-key-for-jwt-signing-2024-make-it-long
    expiration: 86400000